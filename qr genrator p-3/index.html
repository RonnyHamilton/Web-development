<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR code generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card">
        <div class="title">
            <p>Enter Your Text Or Link</p>
        </div>
        <div class="input">
            <input id="qrtext" type="text" placeholder="Enter URL">
        </div>
        <div class="qr">
            <img id="qrimage" src="">
        </div>
        <button id="generatebtn" onclick="clickqr()">
            Generate QR Code
        </button>
    </div>
    <script src="script.js"></script>
</body>

</html>
